<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Privacy-respecting analytics (Plausible) — see supabase/README.md Phase 11 -->
<script defer data-domain="casa.co.uk" src="https://plausible.io/js/script.js"></script>
<!-- Error monitoring (Sentry) — inert until CASA_SENTRY_DSN is set for real, see casa-monitoring.js -->
<script src="https://browser.sentry-cdn.com/7.120.0/bundle.min.js" crossorigin="anonymous"></script>
<script src="casa-monitoring.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Casa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="casa.css?v=3">
<link rel="stylesheet" href="casa-tech.css?v=5">
<style>
  .rp-wrap { max-width: 400px; margin: 0 auto; padding: 100px 24px; }
  .rp-wrap h1 { font-family: var(--serif); font-size: 34px; line-height: 1.1; margin-bottom: 10px; text-align: center; }
  .rp-wrap h1 i { font-style: italic; color: var(--brick); }
  .rp-wrap p.tagline { font-size: 14.5px; color: var(--ink-3); text-align: center; margin-bottom: 28px; line-height: 1.6; }
  .rp-icon { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .rp-icon.ok { background: var(--moss); color: white; }
  .rp-icon.err { background: var(--brick); color: white; }
  .rp-icon svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12.5px; font-weight: 500; margin-bottom: 6px; }
  .field input { width: 100%; padding: 12px 14px; border: 1px solid var(--rule-3); border-radius: 10px; font-family: inherit; font-size: 14px; box-sizing: border-box; }
  .field-err { display: none; font-size: 12px; color: #C0392B; margin-top: 4px; }
  .field.has-err input { border-color: #C0392B; }
  .field.has-err .field-err { display: block; }
  .submit-btn { width: 100%; }
  .submit-btn.loading { opacity: 0.7; pointer-events: none; }
</style>
</head>
<body class="tech">

<nav class="casa-nav">
  <a class="brand-lockup" href="index.html"><span class="casa-mark">casa</span><span class="casa-tld">.co.uk</span></a>
</nav>

<div class="rp-wrap" id="rpWrap">
  <p class="tagline">Checking your link&hellip;</p>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="casa-supabase.js"></script>
<script src="casa.js?v=3"></script>
<script>
// Supabase redirects here as #access_token=...&type=recovery on a valid
// link (supabase-js auto-parses that into a real, if short-lived, session
// via detectSessionInUrl), or #error=...&error_code=... on a dead one —
// same shape as auth-callback.html's confirmation flow.
const hashParams = new URLSearchParams(location.hash.replace(/^#/, ''));
const err = hashParams.get('error_code');
const wrap = document.getElementById('rpWrap');

function setFieldErr(hasErr) {
  document.getElementById('f-newpwd').classList.toggle('has-err', hasErr);
}

function showForm() {
  wrap.innerHTML = `
    <h1>Set a new <i>password</i>.</h1>
    <p class="tagline">Choose something you haven't used before.</p>
    <div class="field" id="f-newpwd">
      <label>New password</label>
      <input type="password" id="newpwd" placeholder="At least 8 characters">
      <span class="field-err">Password must be at least 8 characters</span>
    </div>
    <button class="submit-btn btn btn-primary" id="rpBtn" onclick="submitNewPassword()">Update password</button>
  `;
}

async function submitNewPassword() {
  const pwd = document.getElementById('newpwd').value;
  if (pwd.length < 8) { setFieldErr(true); return; }
  setFieldErr(false);

  const btn = document.getElementById('rpBtn');
  btn.classList.add('loading');
  btn.textContent = 'Updating…';

  const { error } = await window.casaSupabase.auth.updateUser({ password: pwd });

  if (error) {
    btn.classList.remove('loading');
    btn.textContent = 'Update password';
    if (window.casaToast) casaToast(error.message);
    else alert(error.message);
    return;
  }

  wrap.innerHTML = `
    <div class="rp-icon ok"><svg viewBox="0 0 24 24"><path d="M4 12l6 6L20 6"/></svg></div>
    <h1>Password <i>updated.</i></h1>
    <p class="tagline">You're signed in with your new password.</p>
    <a class="btn btn-primary" style="width:100%;display:block;text-align:center;box-sizing:border-box" href="browse.html">Continue to Casa</a>
  `;
}
window.submitNewPassword = submitNewPassword;

if (err) {
  wrap.innerHTML = `
    <div class="rp-icon err"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M6 18 18 6"/></svg></div>
    <h1>Link <i>didn't work.</i></h1>
    <p class="tagline">This reset link has expired or was already used. Request a new one from the sign-in page.</p>
    <a class="btn btn-outline" style="width:100%;display:block;text-align:center;box-sizing:border-box" href="signup.html">Back to sign in</a>
  `;
} else {
  // Wait for supabase-js to finish parsing the recovery token from the
  // hash into a session before showing the form.
  let tries = 0;
  const poll = setInterval(async () => {
    tries++;
    const { data: { session } } = await window.casaSupabase.auth.getSession();
    if (session) {
      clearInterval(poll);
      showForm();
    } else if (tries > 20) {
      clearInterval(poll);
      wrap.innerHTML = `
        <div class="rp-icon err"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M6 18 18 6"/></svg></div>
        <h1>Nothing to <i>reset.</i></h1>
        <p class="tagline">This link may already have been used. Request a new one from the sign-in page.</p>
        <a class="btn btn-outline" style="width:100%;display:block;text-align:center;box-sizing:border-box" href="signup.html">Back to sign in</a>`;
    }
  }, 300);
}
</script>
<script src="casa-tech.js?v=5"></script>
</body>
</html>
